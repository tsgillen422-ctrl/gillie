kind = "web"
previewPath = "/"
title = "Gillie"
version = "1.0.0"
id = "artifacts/dhl-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22212

[services.development]
run = "pnpm --filter @workspace/dhl-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dhl-app", "run", "build" ]
publicDir = "artifacts/dhl-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22212"
BASE_PATH = "/"
