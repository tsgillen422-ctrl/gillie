kind = "mobile"
previewPath = "/gillie-mobile/"
title = "Gillie Mobile"
version = "1.0.0"
id = "artifacts/gillie-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/gillie-mobile/" ]
localPort = 21180

[services.development]
run = "pnpm --filter @workspace/gillie-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gillie-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gillie-mobile", "run", "serve" ]

[services.env]
PORT = "21180"
BASE_PATH = "/gillie-mobile/"
