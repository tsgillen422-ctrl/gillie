                  $ref: "#/components/schemas/Catch"
    post:
      operationId: createCatch
      tags: [catches]
      summary: Log a catch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatchInput"
      responses:
        "201":
          description: Catch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catch"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /catches/{catchId}:
    delete:
      operationId: deleteCatch
      tags: [catches]
      summary: Delete a catch
      parameters:
        - name: catchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /gallery:
    get:
      operationId: getGallery
      tags: [gallery]
      summary: Get a user's gallery of photos and videos
      parameters:
        - name: profileUserId
          in: query
          required: false
          description: When set, returns the given user's gallery. Defaults to the current user.
          schema:
            type: integer
      responses:
        "200":
          description: List of gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"
    post:
      operationId: createGalleryItem
      tags: [gallery]
      summary: Add a photo or video to the gallery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItemInput"
      responses:
        "201":
          description: Gallery item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /gallery/{itemId}:
    delete:
      operationId: deleteGalleryItem
      tags: [gallery]
      summary: Delete a gallery item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Unified search across users, pins, and posts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: lakeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /users/me/sos:
    post:
      operationId: sendSos
      tags: [users]
      summary: Send an emergency SOS alert to friends
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SosInput"
      responses:
        "200":
          description: SOS sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResult"

  /users/me/waiver:
    post:
      operationId: acceptWaiver
      tags: [users]
      summary: Record acceptance of the liability waiver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaiverAccept"
      responses:
        "200":
          description: Waiver accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/terms:
    post:
      operationId: acceptTerms
      tags: [users]
      summary: Record acceptance of the Terms of Service, Privacy Policy, and Community Guidelines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TermsAccept"
      responses:
        "200":
          description: Terms accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /reports:
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit a report about a post, user, or pin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
    get:
      operationId: getReports
      tags: [reports]
      summary: List reports (admin only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, dismissed, resolved]
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportDetail"

  /reports/{id}:
    patch:
      operationId: resolveReport
      tags: [reports]
      summary: Take moderation action on a report (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportResolveInput"
      responses:
        "200":
          description: Report resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /posts/saved:
    get:
      operationId: getSavedPosts
      tags: [posts]
      summary: Get the current user's saved posts
      responses:
        "200":
          description: List of saved posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/{postId}/save:
    post:
      operationId: savePost
      tags: [posts]
      summary: Save (bookmark) a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved
    delete:
      operationId: unsavePost
      tags: [posts]
      summary: Remove a post from saved
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unsaved

  /friends/mutes:
    get:
      operationId: getMutedUsers
      tags: [friends]
      summary: Get the current user's muted users
      responses:
        "200":
          description: List of muted users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/{userId}/mute:
    post:
      operationId: muteUser
      tags: [friends]
      summary: Mute a user (hide their posts)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Muted
    delete:
      operationId: unmuteUser
      tags: [friends]
      summary: Unmute a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unmuted

