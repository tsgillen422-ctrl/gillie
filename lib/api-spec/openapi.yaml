    SosResult:
      type: object
      required: [success, notified]
      properties:
        success:
          type: boolean
        notified:
          type: integer
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]

    SearchResults:
      type: object
      required: [users, pins, posts]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pins:
          type: array
          items:
            $ref: "#/components/schemas/SearchPin"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/SearchPost"

    SearchPin:
      type: object
      required: [id, title, type]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
        lat:
          type: number
        lng:
          type: number

    SearchPost:
      type: object
      required: [id, title, postType, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        postType:
          type: string
        createdAt:
          type: string

    Notification:
      type: object
      required: [id, userId, type, message, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [friend_request, message, post_like, pin_like, event, system, sos, rsvp, warning]
        message:
          type: string
        read:
          type: boolean
        relatedId:
          type: ["integer", "null"]
        createdAt:
          type: string

    VapidPublicKey:
      type: object
      required: [publicKey]
      properties:
        publicKey:
          type: string

    PushSubscriptionInput:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
            auth:
              type: string

    PushUnsubscribeInput:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string

    NativePushTokenInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
        platform:
          type: string

    NativePushUnregisterInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ReportInput:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [post, user, pin]
        targetId:
          type: integer
        reason:
          type: string
        details:
          type: string

    ReportResolveInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [dismiss, remove, warn, suspend]

    SetAdminInput:
      type: object
      required: [isAdmin]
      properties:
        isAdmin:
          type: boolean

    SetSuspensionInput:
      type: object
      required: [suspended]
      properties:
        suspended:
          type: boolean

    Report:
      type: object
      required: [id, reporterId, targetType, targetId, reason, status, createdAt]
      properties:
        id:
          type: integer
        reporterId:
          type: integer
        targetType:
          type: string
          enum: [post, user, pin]
        targetId:
          type: integer
        reason:
          type: string
        details:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, dismissed, resolved]
        action:
          type: ["string", "null"]
          enum: [dismissed, removed, warned, suspended, null]
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    ReportTargetUser:
      type: object
      required: [id, username, displayName]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isSuspended:
          type: boolean
        warningCount:
          type: integer

    ReportDetail:
      allOf:
        - $ref: "#/components/schemas/Report"
        - type: object
          properties:
            reporter:
              oneOf:
                - $ref: "#/components/schemas/ReportTargetUser"
                - type: "null"
            targetOwner:
              oneOf:
                - $ref: "#/components/schemas/ReportTargetUser"
                - type: "null"
            targetSummary:
              type: ["string", "null"]
            targetExists:
              type: boolean
