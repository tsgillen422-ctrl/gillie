openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DHL - Dale Hollow Lake API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: friends
    description: Friend/follow operations
  - name: messages
    description: Messaging operations
  - name: pins
    description: Map pin operations
  - name: dockLabels
    description: Admin-placed dock/shoreline labels
  - name: posts
    description: Post and event operations
  - name: notifications
    description: Notification operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only maintenance operations.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteCurrentUser
      tags: [users]
      summary: Permanently delete your own account and all of your content
      responses:
        "200":
          description: Account deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /users/me/location:
    patch:
      operationId: updateMyLocation
      tags: [users]
      summary: Update current user's location on the lake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/checkin:
    post:
      operationId: checkInLocation
      tags: [users]
      summary: Manually check in to start sharing your location for an expiring window
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/checkout:
    post:
      operationId: checkOutLocation
      tags: [users]
      summary: Stop sharing your location (ends the current check-in)
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/boats:
    get:
      operationId: getMyBoats
      tags: [boats]
      summary: List the authenticated user's fleet
      responses:
        "200":
          description: The user's boats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Boat"
    post:
      operationId: createBoat
      tags: [boats]
      summary: Add a boat/watercraft to the fleet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoatInput"
      responses:
        "201":
          description: Boat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boat"

  /boats/{boatId}:
    parameters:
      - name: boatId
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateBoat
      tags: [boats]
      summary: Update a boat in the fleet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoatUpdate"
      responses:
        "200":
          description: Boat updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boat"
    delete:
      operationId: deleteBoat
      tags: [boats]
      summary: Remove a boat from the fleet
      responses:
        "204":
          description: Boat deleted

  /boats/{boatId}/primary:
    post:
      operationId: setPrimaryBoat
      tags: [boats]
      summary: Mark a boat as the Primary Boat (shown on profile and used on the map by default)
      parameters:
        - name: boatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated fleet
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Boat"

  /users/admins:
    get:
      operationId: getAdmins
      tags: [users]
      summary: List all admin users (admin only)
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/waiver-acceptances:
    get:
      operationId: getWaiverAcceptances
      tags: [users]
      summary: List all waiver acceptance records (admin only)
      responses:
        "200":
          description: Waiver acceptance history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaiverAcceptanceRecord"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}/admin:
    patch:
      operationId: setUserAdmin
      tags: [users]
      summary: Grant or revoke admin access for a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAdminInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/suspended:
    get:
      operationId: getSuspendedUsers
      tags: [users]
      summary: List all suspended users (admin only)
      responses:
        "200":
          description: List of suspended users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}/suspension:
    patch:
      operationId: setUserSuspension
      tags: [users]
      summary: Suspend or restore a user account (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSuspensionInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/demo-data:
    get:
      operationId: getDemoDataStatus
      tags: [admin]
      summary: Get demo data status (admin only)
      responses:
        "200":
          description: Demo data status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataStatus"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: seedDemoData
      tags: [admin]
      summary: Generate demo data (admin only)
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataSeedResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: clearDemoData
      tags: [admin]
      summary: Remove demo data (admin only)
      responses:
        "200":
          description: Clear result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataClearResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by name or username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Permanently delete a user and all their content (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get all accepted friends/follows
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/locations:
    get:
      operationId: getFriendLocations
      tags: [friends]
      summary: Get all friends' current locations on the lake
      parameters:
        - name: lakeId
          in: query
          required: false
          description: Only include friends checked in at this lake
          schema:
            type: integer
      responses:
        "200":
          description: Friends with location data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendLocation"

  /friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: Get pending friend requests
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/suggestions:
    get:
      operationId: getFriendSuggestions
      tags: [friends]
      summary: Get recommended people to connect with
      responses:
        "200":
          description: Ranked friend suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestedUser"

  /friends/{userId}/follow:
    post:
      operationId: followUser
      tags: [friends]
      summary: Send a friend request / follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Follow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friends/{userId}/unfollow:
    delete:
      operationId: unfollowUser
      tags: [friends]
      summary: Unfollow or remove a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unfollowed

  /friends/blocks:
    get:
      operationId: getBlockedUsers
      tags: [friends]
      summary: Get users you have blocked
      responses:
        "200":
          description: List of blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/{userId}/followers:
    get:
      operationId: getFollowers
      tags: [friends]
      summary: Get users who follow this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of followers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Followers are hidden

  /friends/{userId}/following:
    get:
      operationId: getFollowing
      tags: [friends]
      summary: Get users this user follows
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of followed users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Following list is hidden

  /friends/{userId}/friends:
    get:
      operationId: getUserFriends
      tags: [friends]
      summary: Get a user's accepted friends list
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of the user's friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Friends list is hidden

  /friends/{userId}/mutual:
    get:
      operationId: getMutualFriends
      tags: [friends]
      summary: Get mutual friends shared with this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mutual friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutualFriends"

  /friends/{userId}/block:
    post:
      operationId: blockUser
      tags: [friends]
      summary: Block a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User blocked
    delete:
      operationId: unblockUser
      tags: [friends]
      summary: Unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unblocked

  /friends/{requestId}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

    post:
      operationId: createConversation
      tags: [messages]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /messages/conversations/{conversationId}:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

    delete:
      operationId: deleteConversation
      tags: [messages]
      summary: Delete a conversation and all its messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation deleted

  /messages/conversations/{conversationId}/read:
    post:
      operationId: markConversationRead
      tags: [messages]
      summary: Mark all messages in a conversation as read
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read

  /messages/conversations/{conversationId}/mute:
    post:
      operationId: muteConversation
      tags: [messages]
      summary: Mute or unmute notifications for a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteConversationInput"
      responses:
        "200":
          description: Mute state updated

  /messages/conversations/group:
    post:
      operationId: createGroupConversation
      tags: [messages]
      summary: Start a group conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupConversationInput"
      responses:
        "201":
          description: Group conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conditions:
    get:
      operationId: getConditions
      tags: [conditions]
      summary: Get current weather and water conditions for the lake
      parameters:
        - name: lakeId
          in: query
          required: false
          description: Which lake to fetch conditions for (defaults to Dale Hollow Lake)
          schema:
            type: integer
      responses:
        "200":
          description: Current conditions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conditions"

  /lakes:
    get:
      operationId: getLakes
      tags: [lakes]
      summary: Get the supported lakes catalog
      responses:
        "200":
          description: List of supported lakes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lake"

  /lakes/overview:
    get:
      operationId: getLakesOverview
      tags: [lakes]
      summary: Per-lake community activity stats, ranked by trending score
      responses:
        "200":
          description: One entry per supported lake, most trending first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LakeOverview"

  /lakes/{lakeId}/detail:
    get:
      operationId: getLakeDetail
      tags: [lakes]
      summary: Rich viewer-scoped preview of one lake community for the Lake Overview page
      parameters:
        - name: lakeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lake community preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LakeDetail"
        "404":
          description: Unknown lake id

  /lakes/{lakeId}/places/{placeName}:
    get:
      operationId: getLakePlaceDetail
      tags: [lakes]
      summary: Viewer-scoped detail for one named place on a lake (stories, photos, nearby events, location)
      parameters:
        - name: lakeId
          in: path
          required: true
          schema:
            type: integer
        - name: placeName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LakePlaceDetail"
        "404":
          description: Unknown lake, or no live stories the viewer may see at this place

  /stories:
    get:
      operationId: getStories
      tags: [stories]
      summary: Get active stories grouped by author (privacy-filtered)
      parameters:
        - name: lakeId
          in: query
          required: false
          description: Only include stories posted to this lake
          schema:
            type: integer
      responses:
        "200":
          description: Story groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryGroup"

    post:
      operationId: createStory
      tags: [stories]
      summary: Post a new story (expires in 24h)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Story created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/places:
    get:
      operationId: getStoryPlaces
      tags: [stories]
      summary: Active story counts by tagged place (for map rings + trending)
      parameters:
        - name: lakeId
          in: query
          required: false
          description: Only include stories posted to this lake
          schema:
            type: integer
      responses:
        "200":
          description: Places with active stories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryPlace"

  /stories/place/{placeName}:
    get:
      operationId: getPlaceStories
      tags: [stories]
      summary: Active stories tagged at a place, grouped by author
      parameters:
        - name: placeName
          in: path
          required: true
          schema:
            type: string
        - name: lakeId
          in: query
          required: false
          description: Scope to one lake so same-named places on other lakes don't mix (omitted by older clients)
          schema:
            type: integer
      responses:
        "200":
          description: Story groups at this place
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryGroup"

  /stories/{storyId}:
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete your own story
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Story deleted

  /stories/{storyId}/view:
    post:
      operationId: viewStory
      tags: [stories]
      summary: Mark a story as viewed
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: View recorded

  /stories/{storyId}/react:
    post:
      operationId: reactToStory
      tags: [stories]
      summary: React to a story (one reaction per user, re-reacting swaps emoji)
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryReactionInput"
      responses:
        "204":
          description: Reaction saved
    delete:
      operationId: removeStoryReaction
      tags: [stories]
      summary: Remove my reaction from a story
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Reaction removed

  /stories/{storyId}/vote:
    post:
      operationId: voteStoryPoll
      tags: [stories]
      summary: Vote in a story poll (one vote per user)
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryPollVoteInput"
      responses:
