components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Badge:
      type: object
      required: [key, label, description, earned]
      properties:
        key:
          type: string
        label:
          type: string
        description:
          type: string
        earned:
          type: boolean

    Rank:
      type: object
      required: [key, title, tier, earnedCount, totalCount]
      properties:
        key:
          type: string
        title:
          type: string
        tier:
          type: integer
        earnedCount:
          type: integer
        totalCount:
          type: integer
        nextTitle:
          type: ["string", "null"]
        nextNeeded:
          type: ["integer", "null"]

    User:
      type: object
      required: [id, username, displayName, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        hometown:
          type: ["string", "null"]
        birthday:
          type: ["string", "null"]
        relationshipStatus:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        work:
          type: ["string", "null"]
        isOnline:
          type: boolean
        isBusiness:
          type: boolean
        currentLat:
          type: ["number", "null"]
        currentLng:
          type: ["number", "null"]
        lastSeen:
          type: ["string", "null"]
        boatName:
          type: ["string", "null"]
        boatColor:
          type: ["string", "null"]
        boatType:
          type: ["string", "null"]
        boatNeon:
          type: ["boolean", "null"]
        boatFlag:
          type: ["boolean", "null"]
        boatAccent:
          type: ["string", "null"]
        interests:
          type: array
          items:
            type: string
        shareLocation:
          type: boolean
        requireFollowApproval:
          type: boolean
        showFollowers:
          type: boolean
        showFriends:
          type: boolean
        followerSeeLocation:
          type: boolean
        followerSeePosts:
          type: boolean
        followerSendMessages:
          type: boolean
        showMatureContent:
          type: boolean
        isAdmin:
          type: boolean
        isSuspended:
          type: boolean
        warningCount:
          type: integer
        waiverAcceptedAt:
          type: ["string", "null"]
        waiverVersion:
          type: ["string", "null"]
        friendStatus:
          type: string
          enum: [none, self, accepted, pending_out, pending_in, blocked, blocked_by]
        followerCount:
          type: integer
        followingCount:
          type: integer
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
        rank:
          $ref: "#/components/schemas/Rank"
        createdAt:
          type: string

    WaiverAccept:
      type: object
      required: [version]
      properties:
        version:
          type: string

    WaiverAcceptanceRecord:
      type: object
      required: [id, version, acceptedAt, user]
      properties:
        id:
          type: integer
        version:
          type: string
        acceptedAt:
          type: string
          format: date-time
        user:
          type: object
          required: [id, displayName, username]
          properties:
            id:
              type: integer
            displayName:
              type: string
            username:
              type: string
            avatarUrl:
              type: string
              nullable: true

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        location:
          type: ["string", "null"]
        hometown:
          type: ["string", "null"]
        birthday:
          type: ["string", "null"]
        relationshipStatus:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        work:
          type: ["string", "null"]
        avatarUrl:
          type: string
        coverUrl:
          type: string
        boatName:
          type: string
        boatColor:
          type: string
        boatType:
          type: string
        boatNeon:
          type: boolean
        boatFlag:
          type: boolean
        boatAccent:
          type: ["string", "null"]
        interests:
          type: array
          items:
            type: string
        isBusiness:
          type: boolean
        shareLocation:
          type: boolean
        requireFollowApproval:
          type: boolean
        showFollowers:
          type: boolean
        showFriends:
          type: boolean
        followerSeeLocation:
          type: boolean
        followerSeePosts:
          type: boolean
        followerSendMessages:
          type: boolean
        showMatureContent:
          type: boolean

    LocationUpdate:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number
        onWater:
          type: boolean

    FriendLocation:
      type: object
      required: [userId, displayName, username]
      properties:
        userId:
          type: integer
        displayName:
          type: string
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        boatName:
          type: ["string", "null"]
        boatColor:
          type: ["string", "null"]
        boatType:
          type: ["string", "null"]
        boatNeon:
          type: ["boolean", "null"]
        boatFlag:
          type: ["boolean", "null"]
        boatAccent:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        isBusiness:
          type: ["boolean", "null"]
        isOnline:
          type: boolean
        isOnWater:
          type: ["boolean", "null"]
        lastSeen:
          type: ["string", "null"]

    FriendRequest:
      type: object
      required: [id, followerId, followeeId, status, createdAt]
      properties:
        id:
          type: integer
        followerId:
          type: integer
        followeeId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected]
        follower:
          $ref: "#/components/schemas/User"
        followee:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string

    Conversation:
      type: object
      required: [id, createdAt]
      properties:
        id:
          type: integer
        name:
          type: ["string", "null"]
        isGroup:
          type: boolean
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
        muted:
          type: boolean
        createdAt:
          type: string

    MuteConversationInput:
      type: object
      required: [muted]
      properties:
        muted:
          type: boolean

    ConversationInput:
      type: object
      required: [participantId]
      properties:
        participantId:
          type: integer

