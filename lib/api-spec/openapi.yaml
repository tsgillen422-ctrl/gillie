openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DHL - Dale Hollow Lake API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: friends
    description: Friend/follow operations
  - name: messages
    description: Messaging operations
  - name: pins
    description: Map pin operations
  - name: posts
    description: Post and event operations
  - name: notifications
    description: Notification operations
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/location:
    patch:
      operationId: updateMyLocation
      tags: [users]
      summary: Update current user's location on the lake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by name or username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get all accepted friends/follows
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/locations:
    get:
      operationId: getFriendLocations
      tags: [friends]
      summary: Get all friends' current locations on the lake
      responses:
        "200":
          description: Friends with location data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendLocation"

  /friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: Get pending friend requests
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/{userId}/follow:
    post:
      operationId: followUser
      tags: [friends]
      summary: Send a friend request / follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Follow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friends/{userId}/unfollow:
    delete:
      operationId: unfollowUser
      tags: [friends]
      summary: Unfollow or remove a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unfollowed

  /friends/{requestId}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

    post:
      operationId: createConversation
      tags: [messages]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /messages/conversations/{conversationId}:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/conversations/{conversationId}/read:
    post:
      operationId: markConversationRead
      tags: [messages]
      summary: Mark all messages in a conversation as read
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read

  /messages/conversations/group:
    post:
      operationId: createGroupConversation
      tags: [messages]
      summary: Start a group conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupConversationInput"
      responses:
        "201":
          description: Group conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conditions:
    get:
      operationId: getConditions
      tags: [conditions]
      summary: Get current weather and water conditions for the lake
      responses:
        "200":
          description: Current conditions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conditions"

  /pins:
    get:
      operationId: getPins
      tags: [pins]
      summary: Get all pins on the lake
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [fishing_spot, cliff, waterfall, landmark, hazard, marina, campsite, other]
        - name: profileUserId
          in: query
          required: false
          description: When set, returns the given user's pins for display on their profile (includes their friends-only pins).
          schema:
            type: integer
      responses:
        "200":
          description: List of pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"

    post:
      operationId: createPin
      tags: [pins]
      summary: Drop a pin on the lake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinInput"
      responses:
        "201":
          description: Pin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/{pinId}:
    get:
      operationId: getPin
      tags: [pins]
      summary: Get a specific pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

    delete:
      operationId: deletePin
      tags: [pins]
      summary: Delete a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /pins/{pinId}/like:
    post:
      operationId: likePin
      tags: [pins]
      summary: Like or upvote a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/favorites:
    get:
      operationId: getFavoritePins
      tags: [pins]
      summary: Get the current user's favorited pins
      responses:
        "200":
          description: List of favorited pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"

  /pins/{pinId}/favorite:
    post:
      operationId: toggleFavoritePin
      tags: [pins]
      summary: Toggle favorite on a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated pin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/pending/approval:
    get:
      operationId: getPendingPins
      tags: [pins]
      summary: Get community pins awaiting owner approval
      responses:
        "200":
          description: List of pending community pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"
        "403":
          description: Not the app owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /pins/{pinId}/approve:
    post:
      operationId: approvePin
      tags: [pins]
      summary: Approve a community pin (app owner only)
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"
        "403":
          description: Not the app owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /posts:
    get:
      operationId: getPosts
      tags: [posts]
      summary: Get community feed posts and events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [post, event, business]
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post or event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a specific post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /posts/{postId}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}/comments:
    get:
      operationId: getPostComments
      tags: [posts]
      summary: Get comments on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createPostComment
      tags: [posts]
      summary: Add a comment to a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/{postId}/comments/{commentId}:
    delete:
      operationId: deletePostComment
      tags: [posts]
      summary: Delete a comment
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /posts/summary:
    get:
      operationId: getPostsSummary
      tags: [posts]
      summary: Get a quick summary of community activity
      responses:
        "200":
          description: Activity summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsSummary"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /messages/{messageId}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read

  /pins/hazards/active:
    get:
      operationId: getActiveHazards
      tags: [pins]
      summary: Get active (non-expired) hazard pins
      responses:
        "200":
          description: List of active hazard pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"

  /posts/{postId}/rsvp:
    post:
      operationId: toggleRsvp
      tags: [posts]
      summary: Toggle RSVP (going) for an event post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Not an event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /posts/{postId}/rsvps:
    get:
      operationId: getRsvps
      tags: [posts]
      summary: Get the list of users going to an event
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attendees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RsvpUser"

  /catches:
    get:
      operationId: getCatches
      tags: [catches]
      summary: Get the catch log feed
      parameters:
        - name: profileUserId
          in: query
          required: false
          description: When set, returns the given user's catches (public only unless it's the current user).
          schema:
            type: integer
      responses:
        "200":
          description: List of catches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Catch"
    post:
      operationId: createCatch
      tags: [catches]
      summary: Log a catch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatchInput"
      responses:
        "201":
          description: Catch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catch"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /catches/{catchId}:
    delete:
      operationId: deleteCatch
      tags: [catches]
      summary: Delete a catch
      parameters:
        - name: catchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /gallery:
    get:
      operationId: getGallery
      tags: [gallery]
      summary: Get a user's gallery of photos and videos
      parameters:
        - name: profileUserId
          in: query
          required: false
          description: When set, returns the given user's gallery. Defaults to the current user.
          schema:
            type: integer
      responses:
        "200":
          description: List of gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"
    post:
      operationId: createGalleryItem
      tags: [gallery]
      summary: Add a photo or video to the gallery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItemInput"
      responses:
        "201":
          description: Gallery item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /gallery/{itemId}:
    delete:
      operationId: deleteGalleryItem
      tags: [gallery]
      summary: Delete a gallery item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Unified search across users, pins, and posts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /users/me/sos:
    post:
      operationId: sendSos
      tags: [users]
      summary: Send an emergency SOS alert to friends
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SosInput"
      responses:
        "200":
          description: SOS sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, username, displayName, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isOnline:
          type: boolean
        isBusiness:
          type: boolean
        currentLat:
          type: ["number", "null"]
        currentLng:
          type: ["number", "null"]
        lastSeen:
          type: ["string", "null"]
        boatName:
          type: ["string", "null"]
        boatColor:
          type: ["string", "null"]
        boatType:
          type: ["string", "null"]
        boatNeon:
          type: ["boolean", "null"]
        boatFlag:
          type: ["boolean", "null"]
        boatAccent:
          type: ["string", "null"]
        shareLocation:
          type: boolean
        followerCount:
          type: integer
        followingCount:
          type: integer
        badges:
          type: array
          items:
            type: string
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
