openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DHL - Dale Hollow Lake API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: friends
    description: Friend/follow operations
  - name: messages
    description: Messaging operations
  - name: pins
    description: Map pin operations
  - name: dockLabels
    description: Admin-placed dock/shoreline labels
  - name: posts
    description: Post and event operations
  - name: notifications
    description: Notification operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only maintenance operations.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteCurrentUser
      tags: [users]
      summary: Permanently delete your own account and all of your content
      responses:
        "200":
          description: Account deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /users/me/location:
    patch:
      operationId: updateMyLocation
      tags: [users]
      summary: Update current user's location on the lake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/admins:
    get:
      operationId: getAdmins
      tags: [users]
      summary: List all admin users (admin only)
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/waiver-acceptances:
    get:
      operationId: getWaiverAcceptances
      tags: [users]
      summary: List all waiver acceptance records (admin only)
      responses:
        "200":
          description: Waiver acceptance history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaiverAcceptanceRecord"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}/admin:
    patch:
      operationId: setUserAdmin
      tags: [users]
      summary: Grant or revoke admin access for a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAdminInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/demo-data:
    get:
      operationId: getDemoDataStatus
      tags: [admin]
      summary: Get demo data status (admin only)
      responses:
        "200":
          description: Demo data status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataStatus"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: seedDemoData
      tags: [admin]
      summary: Generate demo data (admin only)
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataSeedResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: clearDemoData
      tags: [admin]
      summary: Remove demo data (admin only)
      responses:
        "200":
          description: Clear result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoDataClearResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by name or username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Permanently delete a user and all their content (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get all accepted friends/follows
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/locations:
    get:
      operationId: getFriendLocations
      tags: [friends]
      summary: Get all friends' current locations on the lake
      responses:
        "200":
          description: Friends with location data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendLocation"

  /friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: Get pending friend requests
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/suggestions:
    get:
      operationId: getFriendSuggestions
      tags: [friends]
      summary: Get recommended people to connect with
      responses:
        "200":
          description: Ranked friend suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestedUser"

  /friends/{userId}/follow:
    post:
      operationId: followUser
      tags: [friends]
      summary: Send a friend request / follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Follow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friends/{userId}/unfollow:
    delete:
      operationId: unfollowUser
      tags: [friends]
      summary: Unfollow or remove a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unfollowed

  /friends/blocks:
    get:
      operationId: getBlockedUsers
      tags: [friends]
      summary: Get users you have blocked
      responses:
        "200":
          description: List of blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/{userId}/followers:
    get:
      operationId: getFollowers
      tags: [friends]
      summary: Get users who follow this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of followers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Followers are hidden

  /friends/{userId}/following:
    get:
      operationId: getFollowing
      tags: [friends]
      summary: Get users this user follows
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of followed users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Following list is hidden

  /friends/{userId}/friends:
    get:
      operationId: getUserFriends
      tags: [friends]
      summary: Get a user's accepted friends list
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of the user's friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Friends list is hidden

  /friends/{userId}/mutual:
    get:
      operationId: getMutualFriends
      tags: [friends]
      summary: Get mutual friends shared with this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mutual friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutualFriends"

  /friends/{userId}/block:
    post:
      operationId: blockUser
      tags: [friends]
      summary: Block a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User blocked
    delete:
      operationId: unblockUser
      tags: [friends]
      summary: Unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unblocked

  /friends/{requestId}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

    post:
      operationId: createConversation
      tags: [messages]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /messages/conversations/{conversationId}:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

    delete:
      operationId: deleteConversation
      tags: [messages]
      summary: Delete a conversation and all its messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation deleted

  /messages/conversations/{conversationId}/read:
    post:
      operationId: markConversationRead
      tags: [messages]
      summary: Mark all messages in a conversation as read
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read

  /messages/conversations/{conversationId}/mute:
    post:
      operationId: muteConversation
      tags: [messages]
      summary: Mute or unmute notifications for a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteConversationInput"
      responses:
        "200":
          description: Mute state updated

  /messages/conversations/group:
    post:
      operationId: createGroupConversation
      tags: [messages]
      summary: Start a group conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupConversationInput"
      responses:
        "201":
          description: Group conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conditions:
    get:
      operationId: getConditions
      tags: [conditions]
      summary: Get current weather and water conditions for the lake
      responses:
        "200":
          description: Current conditions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conditions"

  /pins:
    get:
      operationId: getPins
      tags: [pins]
      summary: Get all pins on the lake
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [fishing_spot, cliff, waterfall, rope_swing, shallow_water, tubing, skiing, houseboat, divers, landmark, hazard, marina, campsite, other]
        - name: profileUserId
          in: query
          required: false
          description: When set, returns the given user's pins for display on their profile (includes their friends-only pins).
          schema:
            type: integer
      responses:
        "200":
          description: List of pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"

    post:
      operationId: createPin
      tags: [pins]
      summary: Drop a pin on the lake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinInput"
      responses:
        "201":
          description: Pin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/{pinId}:
    get:
      operationId: getPin
      tags: [pins]
      summary: Get a specific pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

    delete:
      operationId: deletePin
      tags: [pins]
      summary: Delete a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /pins/{pinId}/like:
    post:
      operationId: likePin
      tags: [pins]
      summary: Like or upvote a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/favorites:
    get:
      operationId: getFavoritePins
      tags: [pins]
      summary: Get the current user's favorited pins
      responses:
        "200":
          description: List of favorited pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"

  /pins/{pinId}/favorite:
    post:
      operationId: toggleFavoritePin
      tags: [pins]
      summary: Toggle favorite on a pin
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated pin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"

  /pins/pending/approval:
    get:
      operationId: getPendingPins
      tags: [pins]
      summary: Get community pins awaiting owner approval
      responses:
        "200":
          description: List of pending community pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pin"
        "403":
          description: Not the app owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /pins/{pinId}/approve:
    post:
      operationId: approvePin
      tags: [pins]
      summary: Approve a community pin (app owner only)
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"
        "403":
          description: Not the app owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /dock-labels:
    get:
      operationId: getDockLabels
      tags: [dockLabels]
      summary: Get all dock labels on the lake
      responses:
        "200":
          description: List of dock labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockLabel"

    post:
      operationId: createDockLabel
      tags: [dockLabels]
      summary: Place a dock label (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DockLabelInput"
      responses:
        "201":
          description: Dock label created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockLabel"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /dock-labels/{labelId}:
    delete:
      operationId: deleteDockLabel
      tags: [dockLabels]
      summary: Remove a dock label (admin only)
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /hidden-places:
    get:
      operationId: getHiddenPlaces
      tags: [hiddenPlaces]
      summary: Get the built-in places that are hidden from the map for everyone
      responses:
        "200":
          description: List of hidden place keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HiddenPlace"
    post:
      operationId: hidePlace
      tags: [hiddenPlaces]
      summary: Permanently hide a built-in place for everyone (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HiddenPlaceInput"
      responses:
        "201":
          description: Place hidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiddenPlace"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /posts:
    get:
      operationId: getPosts
      tags: [posts]
      summary: Get community feed posts and events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [post, event, business, tie_up, boat_showcase]
        - name: audience
          in: query
          required: false
          description: Filter by author relationship. "friends" shows posts from your friends; "community" shows posts from people you are not friends with.
          schema:
            type: string
            enum: [friends, community]
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post or event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}/share:
    post:
      operationId: shareToProfile
      tags: [posts]
      summary: Share a post to your profile (repost)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareInput"
      responses:
        "201":
          description: Shared to profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a specific post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /posts/{postId}/react:
    post:
      operationId: reactToPost
      tags: [posts]
      summary: React to a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Reacted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}/poll/vote:
    post:
      operationId: votePoll
      tags: [posts]
      summary: Vote on a post's poll (one vote per user; voting the same option again removes it)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollVoteInput"
      responses:
        "200":
          description: Updated post with poll results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /gifs/search:
    get:
      operationId: searchGifs
      tags: [gifs]
      summary: Search GIFs to attach to a post
      parameters:
        - name: q
          in: query
          required: false
          schema:
