workflows:
  ios-capacitor-appstore:
    name: Gillie iOS (Capacitor) - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Create this in Codemagic: Teams/User settings -> Integrations -> App Store Connect.
      # Name the key exactly "AppStoreConnect" (or change the name here to match).
      app_store_connect: AppStoreConnect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.dalehollowlake
      vars:
        BUNDLE_ID: "app.dalehollowlake"
        XCODE_PROJECT: "artifacts/dhl-app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Numeric App Store Connect "Apple ID" of the app record. Fill this in after you
        # create the app in App Store Connect (App Information -> General -> Apple ID).
        APP_STORE_APPLE_ID: 6779852403
        # Keep corepack non-interactive so it never stalls waiting for a prompt.
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      # pnpm 11.6.0 requires Node >= 22.13 (it uses the built-in node:sqlite module;
      # Node 20 crashes with ERR_UNKNOWN_BUILTIN_MODULE). Pinned to 24 to match the
      # local toolchain (Node 24 LTS) so CI and local stay in lockstep.
      node: 24
      xcode: latest
    scripts:
      - name: Install pnpm
        script: |
          # pnpm-only project (the root preinstall script rejects npm/yarn; there
          # is no Yarn config). Bootstrap pnpm deterministically via corepack only
          # -- no `npm install -g pnpm`, no partial installs. 11.6.0 matches the
          # local toolchain that generated pnpm-lock.yaml and is required for the
          # workspace's catalog:/overrides features.
          corepack enable
          corepack prepare pnpm@11.6.0 --activate
          # Debug output before install:
          node -v
          corepack -v
          pnpm -v
      - name: Install dependencies
        script: |
          # This iOS app is a server.url webview (see capacitor.config.ts): it loads
          # the live published site and never uses the bundled web assets, so CI needs
          # NO native build binaries. --ignore-scripts skips dependency build scripts,
          # which (a) avoids ERR_PNPM_IGNORED_BUILDS (esbuild's build is ignored even
          # when allowlisted, because of its version-pinning override) and (b) sidesteps
          # the macOS native-binary problem: the workspace overrides strip every
          # non-linux-x64 platform binary (esbuild/rollup/lightningcss/oxide), so a real
          # web build cannot run on the mac runner anyway.
          pnpm install --ignore-scripts
      - name: Prepare web assets (server.url webview)
        script: |
          # The app loads server.url (the live site), so dist/public is only a
          # placeholder that Capacitor copies into the native project. `dist` is
          # gitignored, so create a minimal valid webDir for `cap sync` to copy.
          mkdir -p artifacts/dhl-app/dist/public
          echo '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Gillie</title></head><body></body></html>' > artifacts/dhl-app/dist/public/index.html
      - name: Capacitor sync (iOS)
        script: |
          pnpm --filter @workspace/dhl-app run cap:sync
      - name: Set build number
        ignore_failure: true
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          cd "$CM_BUILD_DIR/artifacts/dhl-app/ios/App"
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Use existing 'Gillie Distribution' profile
        script: |
          set -euo pipefail
          # Per request: DO NOT regenerate (create/delete) provisioning profiles.
          # Instead, use the existing App Store profile named "Gillie Distribution" that
          # is already managed in the Apple Developer portal. We only FETCH it (read-only)
          # via the AppStoreConnect integration's API key and install it locally --
          # nothing is created or deleted in the Apple account.
          # Xcode tools read profiles from two locations depending on version, so install
          # into BOTH the legacy MobileDevice dir and the modern Xcode UserData dir.
          PROFILE_NAME="Gillie Distribution"
          LEGACY_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$LEGACY_DIR" "$XCODE_DIR"
          # Clear any profile auto-prep installed so use-profiles can ONLY pick the one we
          # install below. (Local cleanup only -- nothing is removed from the Apple account.)
          rm -f "$LEGACY_DIR/"*.mobileprovision "$XCODE_DIR/"*.mobileprovision 2>/dev/null || true

          echo "==> Listing App Store profiles and locating '$PROFILE_NAME'"
          # `profiles list --save` downloads the matching profiles to disk; we then keep
          # ONLY the one named "$PROFILE_NAME". (We match by name in python because the CLI
          # has no reliable server-side name filter.)
          app-store-connect profiles list --type IOS_APP_STORE --save --json > /tmp/profiles.json || echo '[]' > /tmp/profiles.json
          MATCH_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/profiles.json')); d=d.get('data',d) if isinstance(d,dict) else d; print(sum(1 for p in d if p.get('attributes',{}).get('name','')=='$PROFILE_NAME'))")
          WANT_UUID=$(python3 -c "import json; d=json.load(open('/tmp/profiles.json')); d=d.get('data',d) if isinstance(d,dict) else d; print(next((p.get('attributes',{}).get('uuid','') for p in d if p.get('attributes',{}).get('name','')=='$PROFILE_NAME'), ''))")
          [ -n "$WANT_UUID" ] || { echo "!! No IOS_APP_STORE provisioning profile named '$PROFILE_NAME' was found in the App Store Connect account this API key uses. Verify the profile's exact name and that it is an App Store distribution profile (team T6769T4X35)."; echo "    profiles found:"; python3 -c "import json; d=json.load(open('/tmp/profiles.json')); d=d.get('data',d) if isinstance(d,dict) else d; [print('     -', p.get('attributes',{}).get('name','?')) for p in d]" || true; exit 1; }
          [ "$MATCH_COUNT" = "1" ] || echo "WARNING: $MATCH_COUNT profiles are named '$PROFILE_NAME'; using the first (UUID $WANT_UUID). Rename or remove duplicates if signing fails."
          echo "    '$PROFILE_NAME' -> UUID $WANT_UUID"

          # Remove every saved profile whose embedded UUID is NOT the one we want, so
          # use-profiles can only apply "$PROFILE_NAME".
          shopt -s nullglob
          for p in "$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision; do
            security cms -D -i "$p" 2>/dev/null > /tmp/pp.plist || { rm -f "$p"; continue; }
            UUID=$(plutil -extract UUID raw /tmp/pp.plist 2>/dev/null || true)
            [ "$UUID" = "$WANT_UUID" ] || rm -f "$p"
          done
          # Mirror the kept profile into BOTH dirs so use-profiles / xcodebuild find it
          # regardless of which default each tool reads.
          for f in "$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision; do
            base=$(basename "$f")
            [ -f "$LEGACY_DIR/$base" ] || cp -f "$f" "$LEGACY_DIR/"
            [ -f "$XCODE_DIR/$base" ] || cp -f "$f" "$XCODE_DIR/"
          done
          echo "==> Profiles now installed locally:"
          ls -la "$LEGACY_DIR" "$XCODE_DIR" || true
          # Guard: ensure the wanted profile actually survived pruning. Without this,
          # use-profiles can exit 0 with no profile and the archive fails later with a
          # much more cryptic error.
          remaining_files=("$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision)
          [ "${#remaining_files[@]}" != "0" ] || { echo "!! After selecting '$PROFILE_NAME' no .mobileprovision remained installed. The profile may not have downloaded correctly."; exit 1; }
      - name: Fetch signing files
        script: |
          set -e
          # The previous step installed the existing "Gillie Distribution" profile.
          # Print each installed profile's Push (aps-environment) status for diagnostics
          # (informational only -- this does NOT block the build), then apply the
          # certificate (loaded into the keychain by automatic signing) + the profile
          # to the Xcode project. If you see "PUSH MISSING" and the archive later fails
          # on entitlements, the "Gillie Distribution" profile needs Push regenerated in
          # the Apple portal.
          echo "==> Provisioning profiles installed (both possible locations):"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" || true
          echo "==> Inspecting each profile for the Push (aps-environment) entitlement:"
          shopt -s nullglob
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision; do
            echo "---- $p ----"
            security cms -D -i "$p" 2>/dev/null | grep -A1 "<key>Name</key>" || true
            if security cms -D -i "$p" 2>/dev/null | grep -qi "aps-environment"; then
              echo "   PUSH OK: aps-environment IS present in this profile"
            else
              echo "   PUSH MISSING: aps-environment is NOT in this profile"
            fi
          done
          # Apply the installed certificate + profile to the Xcode project.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Run the archive/IPA build, but on failure dump the REAL xcodebuild
          # error lines to the console. `xcode-project build-ipa` writes the full
          # xcodebuild output to /tmp/xcodebuild_logs/*.log; Codemagic's step view
          # only shows the "Failed to archive" summary, which hides the actual
          # compiler/signing error. This surfaces it inline so it's diagnosable.
          set +e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
          BUILD_EXIT=$?
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "==================== xcodebuild errors ===================="
            grep -nEi "error:|Provisioning profile|aps-environment|code ?sign|requires a provisioning|no profiles|doesn't include|no account|no signing certificate|entitlement" /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -n 120
            echo "================ last 150 lines of log ==================="
            tail -n 150 /tmp/xcodebuild_logs/*.log 2>/dev/null
            echo "=========================================================="
          fi
          exit "$BUILD_EXIT"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Flip submit_to_app_store to true once
        # you're ready to push a build to App Store review.
        submit_to_testflight: true
        submit_to_app_store: false
