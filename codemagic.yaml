workflows:
  ios-capacitor-appstore:
    name: Gillie iOS (Capacitor) - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Create this in Codemagic: Teams/User settings -> Integrations -> App Store Connect.
      # Name the key exactly "AppStoreConnect" (or change the name here to match).
      app_store_connect: AppStoreConnect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.dalehollowlake
      vars:
        BUNDLE_ID: "app.dalehollowlake"
        XCODE_PROJECT: "artifacts/dhl-app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Numeric App Store Connect "Apple ID" of the app record. Fill this in after you
        # create the app in App Store Connect (App Information -> General -> Apple ID).
        APP_STORE_APPLE_ID: 6779852403
        # Keep corepack non-interactive so it never stalls waiting for a prompt.
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      # pnpm 11.6.0 requires Node >= 22.13 (it uses the built-in node:sqlite module;
      # Node 20 crashes with ERR_UNKNOWN_BUILTIN_MODULE). Pinned to 24 to match the
      # local toolchain (Node 24 LTS) so CI and local stay in lockstep.
      node: 24
      xcode: latest
    scripts:
      - name: Install pnpm
        script: |
          # pnpm-only project (the root preinstall script rejects npm/yarn; there
          # is no Yarn config). Bootstrap pnpm deterministically via corepack only
          # -- no `npm install -g pnpm`, no partial installs. 11.6.0 matches the
          # local toolchain that generated pnpm-lock.yaml and is required for the
          # workspace's catalog:/overrides features.
          corepack enable
          corepack prepare pnpm@11.6.0 --activate
          # Debug output before install:
          node -v
          corepack -v
          pnpm -v
      - name: Install dependencies
        script: |
          # This iOS app is a server.url webview (see capacitor.config.ts): it loads
          # the live published site and never uses the bundled web assets, so CI needs
          # NO native build binaries. --ignore-scripts skips dependency build scripts,
          # which (a) avoids ERR_PNPM_IGNORED_BUILDS (esbuild's build is ignored even
          # when allowlisted, because of its version-pinning override) and (b) sidesteps
          # the macOS native-binary problem: the workspace overrides strip every
          # non-linux-x64 platform binary (esbuild/rollup/lightningcss/oxide), so a real
          # web build cannot run on the mac runner anyway.
          pnpm install --ignore-scripts
      - name: Prepare web assets (server.url webview)
        script: |
          # The app loads server.url (the live site), so dist/public is only a
          # placeholder that Capacitor copies into the native project. `dist` is
          # gitignored, so create a minimal valid webDir for `cap sync` to copy.
          mkdir -p artifacts/dhl-app/dist/public
          echo '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Gillie</title></head><body></body></html>' > artifacts/dhl-app/dist/public/index.html
      - name: Capacitor sync (iOS)
        script: |
          pnpm --filter @workspace/dhl-app run cap:sync
      - name: Set build number to 15 (agvtool, hard-forced)
        script: |
          set -euo pipefail
          # Hard-force CFBundleVersion to exactly 15. App Store Connect already has build 9/10/11/13/14,
          # so this upload MUST be 15.
          # Auto-increment / "latest App Store build number" is intentionally NOT used
          # anywhere -- the value is pinned here and verified against the real IPA before
          # the App Store Connect publishing step runs.
          PROJECT_DIR="$CM_BUILD_DIR/artifacts/dhl-app/ios/App"
          PLIST="$PROJECT_DIR/App/Info.plist"
          PBXPROJ="$PROJECT_DIR/App.xcodeproj/project.pbxproj"

          # Primary: agvtool. This now actually writes the version because the project
          # sets VERSIONING_SYSTEM = apple-generic (without it, agvtool silently no-ops,
          # which is how earlier builds kept shipping the old number).
          cd "$PROJECT_DIR"
          agvtool new-version -all 15
          agvtool new-marketing-version 1.0
          cd "$CM_BUILD_DIR"

          # Belt-and-suspenders: also pin the build settings and write literal values
          # straight into the archived Info.plist, so the number is correct even if the
          # apple-generic path ever changes. Then FAIL loud if it isn't 15 -- a wrong
          # number can never archive.
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = 15;/g' "$PBXPROJ"
          sed -i '' 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.0;/g' "$PBXPROJ"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 15" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"

          CFV=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          CFSV=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          echo "==> CFBundleVersion=$CFV  CFBundleShortVersionString=$CFSV"
          [ "$CFV" = "15" ] || { echo "!! CFBundleVersion is '$CFV', expected 15 -- aborting."; exit 1; }
          [ "$CFSV" = "1.0" ] || { echo "!! CFBundleShortVersionString is '$CFSV', expected 1.0 -- aborting."; exit 1; }
      - name: Select App Store profile for the bundle id
        script: |
          set -euo pipefail
          # Per request: DO NOT regenerate (create/delete) profiles and DO NOT hard-code a
          # profile name. Fetch the existing App Store profiles (read-only) and AUTOMATICALLY
          # select the one whose embedded App ID matches our bundle id -- whatever it's named.
          # Nothing is created or deleted in the Apple account.
          # Xcode tools read profiles from two locations depending on version, so install
          # into BOTH the legacy MobileDevice dir and the modern Xcode UserData dir.
          BUNDLE_ID="app.dalehollowlake"
          LEGACY_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$LEGACY_DIR" "$XCODE_DIR"
          # Clear any profile auto-prep installed so use-profiles can ONLY pick the one we
          # select below. (Local cleanup only -- nothing is removed from the Apple account.)
          rm -f "$LEGACY_DIR/"*.mobileprovision "$XCODE_DIR/"*.mobileprovision 2>/dev/null || true

          echo "==> Downloading existing App Store profiles"
          app-store-connect profiles list --type IOS_APP_STORE --save --json > /tmp/profiles.json || echo '[]' > /tmp/profiles.json

          # Inspect each saved profile's embedded application-identifier and keep the one
          # matching our bundle id. If several match (e.g. multiple CI profiles), pick the
          # newest by CreationDate so we always use the most recent capabilities.
          shopt -s nullglob
          BEST_FILE=""
          BEST_DATE=""
          for p in "$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision; do
            security cms -D -i "$p" 2>/dev/null > /tmp/pp.plist || continue
            APPID=$(plutil -extract Entitlements.application-identifier raw /tmp/pp.plist 2>/dev/null || true)
            case "$APPID" in
              *".$BUNDLE_ID") ;;
              *) continue ;;
            esac
            CDATE=$(plutil -extract CreationDate raw /tmp/pp.plist 2>/dev/null || echo "")
            PNAME=$(plutil -extract Name raw /tmp/pp.plist 2>/dev/null || echo "?")
            echo "    candidate: '$PNAME' ($APPID, created $CDATE)"
            if [ -z "$BEST_FILE" ] || [[ "$CDATE" > "$BEST_DATE" ]]; then
              BEST_FILE="$p"; BEST_DATE="$CDATE"
            fi
          done
          [ -n "$BEST_FILE" ] || { echo "!! No App Store provisioning profile for bundle '$BUNDLE_ID' was found in the App Store Connect account this API key uses. Profiles found:"; python3 -c "import json; d=json.load(open('/tmp/profiles.json')); d=d.get('data',d) if isinstance(d,dict) else d; [print('     -', p.get('attributes',{}).get('name','?')) for p in d]" || true; exit 1; }
          BEST_BASE=$(basename "$BEST_FILE")
          echo "==> Selected profile file: $BEST_BASE (created $BEST_DATE)"

          # Keep ONLY the selected profile, then mirror it into BOTH dirs so use-profiles /
          # xcodebuild find it regardless of which default each tool reads.
          for p in "$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision; do
            [ "$(basename "$p")" = "$BEST_BASE" ] || rm -f "$p"
          done
          cp -f "$BEST_FILE" "$LEGACY_DIR/$BEST_BASE" 2>/dev/null || true
          cp -f "$BEST_FILE" "$XCODE_DIR/$BEST_BASE" 2>/dev/null || true
          echo "==> Profiles now installed locally:"
          ls -la "$LEGACY_DIR" "$XCODE_DIR" || true
          # Guard: ensure the selected profile actually survived. Without this, use-profiles
          # can exit 0 with no profile and the archive fails later with a cryptic error.
          remaining_files=("$LEGACY_DIR"/*.mobileprovision "$XCODE_DIR"/*.mobileprovision)
          [ "${#remaining_files[@]}" != "0" ] || { echo "!! After selecting the profile for '$BUNDLE_ID' no .mobileprovision remained installed."; exit 1; }
      - name: Fetch signing files
        script: |
          set -e
          # The previous step installed the App Store profile selected by bundle id.
          # Print each installed profile's Push (aps-environment) status for diagnostics
          # (informational only -- this does NOT block the build), then apply the
          # certificate (loaded into the keychain by automatic signing) + the profile
          # to the Xcode project. If you see "PUSH MISSING" and the archive later fails
          # on entitlements, the selected profile needs Push regenerated in the Apple
          # portal.
          echo "==> Provisioning profiles installed (both possible locations):"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" || true
          echo "==> Inspecting each profile for the Push (aps-environment) entitlement:"
          shopt -s nullglob
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision; do
            echo "---- $p ----"
            security cms -D -i "$p" 2>/dev/null | grep -A1 "<key>Name</key>" || true
            if security cms -D -i "$p" 2>/dev/null | grep -qi "aps-environment"; then
              echo "   PUSH OK: aps-environment IS present in this profile"
            else
              echo "   PUSH MISSING: aps-environment is NOT in this profile"
            fi
          done
          # Apply the installed certificate + profile to the Xcode project.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Run the archive/IPA build, but on failure dump the REAL xcodebuild
          # error lines to the console. `xcode-project build-ipa` writes the full
          # xcodebuild output to /tmp/xcodebuild_logs/*.log; Codemagic's step view
          # only shows the "Failed to archive" summary, which hides the actual
          # compiler/signing error. This surfaces it inline so it's diagnosable.
          set +e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
          BUILD_EXIT=$?
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "==================== xcodebuild errors ===================="
            grep -nEi "error:|Provisioning profile|aps-environment|code ?sign|requires a provisioning|no profiles|doesn't include|no account|no signing certificate|entitlement" /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -n 120
            echo "================ last 150 lines of log ==================="
            tail -n 150 /tmp/xcodebuild_logs/*.log 2>/dev/null
            echo "=========================================================="
          fi
          exit "$BUILD_EXIT"
      - name: Verify IPA build number is 15 (gate before upload)
        script: |
          set -euo pipefail
          # FINAL GATE before the app_store_connect publishing step runs. Inspect the
          # actual archived IPA and FAIL the build if CFBundleVersion != 15, so a wrong
          # build number (e.g. an old 8/9 Apple already has) can NEVER be uploaded.
          # This is the source of truth -- it checks the real binary, not the project.
          shopt -s nullglob
          ipas=("$CM_BUILD_DIR"/build/ios/ipa/*.ipa)
          [ "${#ipas[@]}" -ge 1 ] || { echo "!! No .ipa found in build/ios/ipa -- cannot verify build number."; exit 1; }
          IPA="${ipas[0]}"
          echo "==> Inspecting IPA: $IPA"
          WORK="$(mktemp -d)"
          unzip -q "$IPA" -d "$WORK"
          app_plists=("$WORK"/Payload/*.app/Info.plist)
          [ "${#app_plists[@]}" -ge 1 ] || { echo "!! No Payload/*.app/Info.plist inside the IPA."; rm -rf "$WORK"; exit 1; }
          APP_PLIST="${app_plists[0]}"
          CFV="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PLIST")"
          CFSV="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PLIST")"
          rm -rf "$WORK"
          echo "==> IPA CFBundleVersion=$CFV  CFBundleShortVersionString=$CFSV"
          [ "$CFV" = "15" ] || { echo "!! IPA CFBundleVersion is '$CFV', expected 15 -- refusing to upload to App Store Connect."; exit 1; }
          [ "$CFSV" = "1.0" ] || { echo "!! IPA CFBundleShortVersionString is '$CFSV', expected 1.0 -- refusing to upload."; exit 1; }
          echo "==> OK: IPA build number is 15 (version 1.0), safe to upload."
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Flip submit_to_app_store to true once
        # you're ready to push a build to App Store review.
        submit_to_testflight: true
        submit_to_app_store: false
