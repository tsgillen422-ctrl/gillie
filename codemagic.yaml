workflows:
  ios-capacitor-appstore:
    name: Gillie iOS (Capacitor) - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Create this in Codemagic: Teams/User settings -> Integrations -> App Store Connect.
      # Name the key exactly "AppStoreConnect" (or change the name here to match).
      app_store_connect: AppStoreConnect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.dalehollowlake
      vars:
        BUNDLE_ID: "app.dalehollowlake"
        XCODE_PROJECT: "artifacts/dhl-app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Numeric App Store Connect "Apple ID" of the app record. Fill this in after you
        # create the app in App Store Connect (App Information -> General -> Apple ID).
        APP_STORE_APPLE_ID: 6779852403
        # Keep corepack non-interactive so it never stalls waiting for a prompt.
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      # pnpm 11.6.0 requires Node >= 22.13 (it uses the built-in node:sqlite module;
      # Node 20 crashes with ERR_UNKNOWN_BUILTIN_MODULE). Pinned to 24 to match the
      # local toolchain (Node 24 LTS) so CI and local stay in lockstep.
      node: 24
      xcode: latest
    scripts:
      - name: Install pnpm
        script: |
          # pnpm-only project (the root preinstall script rejects npm/yarn; there
          # is no Yarn config). Bootstrap pnpm deterministically via corepack only
          # -- no `npm install -g pnpm`, no partial installs. 11.6.0 matches the
          # local toolchain that generated pnpm-lock.yaml and is required for the
          # workspace's catalog:/overrides features.
          corepack enable
          corepack prepare pnpm@11.6.0 --activate
          # Debug output before install:
          node -v
          corepack -v
          pnpm -v
      - name: Install dependencies
        script: |
          # This iOS app is a server.url webview (see capacitor.config.ts): it loads
          # the live published site and never uses the bundled web assets, so CI needs
          # NO native build binaries. --ignore-scripts skips dependency build scripts,
          # which (a) avoids ERR_PNPM_IGNORED_BUILDS (esbuild's build is ignored even
          # when allowlisted, because of its version-pinning override) and (b) sidesteps
          # the macOS native-binary problem: the workspace overrides strip every
          # non-linux-x64 platform binary (esbuild/rollup/lightningcss/oxide), so a real
          # web build cannot run on the mac runner anyway.
          pnpm install --ignore-scripts
      - name: Prepare web assets (server.url webview)
        script: |
          # The app loads server.url (the live site), so dist/public is only a
          # placeholder that Capacitor copies into the native project. `dist` is
          # gitignored, so create a minimal valid webDir for `cap sync` to copy.
          mkdir -p artifacts/dhl-app/dist/public
          echo '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Gillie</title></head><body></body></html>' > artifacts/dhl-app/dist/public/index.html
      - name: Capacitor sync (iOS)
        script: |
          pnpm --filter @workspace/dhl-app run cap:sync
      - name: Set build number
        ignore_failure: true
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          cd "$CM_BUILD_DIR/artifacts/dhl-app/ios/App"
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Regenerate App Store profile with Push
        script: |
          set -euo pipefail
          # WHY: automatic signing keeps reusing a stale "Gillie app store profile"
          # that was created BEFORE Push was enabled on the App ID, so it lacks the
          # aps-environment entitlement and the archive fails. That profile still
          # exists in the Apple account THIS API key talks to (even if it doesn't show
          # in the portal you browse). So we use the SAME App Store Connect API key
          # (provided by the AppStoreConnect integration via APP_STORE_CONNECT_* env
          # vars) to delete the stale profile and mint a fresh one. A freshly created
          # profile automatically inherits the App ID's CURRENT capabilities, including
          # Push -- no private key needed (profiles reference the cert by ID only).
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          # Auto-prep already installed the stale profile locally; clear it so only the
          # fresh profile we create below remains for xcode-project use-profiles.
          rm -f "$PROFILES_DIR/"*.mobileprovision 2>/dev/null || true

          echo "==> Resolving Bundle ID resource for $BUNDLE_ID"
          app-store-connect bundle-ids list --bundle-id-identifier "$BUNDLE_ID" --strict-match-identifier --json > /tmp/bundle_ids.json
          BUNDLE_RESOURCE_ID=$(python3 -c "import json; d=json.load(open('/tmp/bundle_ids.json')); d=d.get('data',d) if isinstance(d,dict) else d; print(d[0]['id'] if d else '')")
          echo "    bundle resource id: $BUNDLE_RESOURCE_ID"
          [ -n "$BUNDLE_RESOURCE_ID" ] || { echo "!! No Bundle ID resource found for $BUNDLE_ID -- check the App Store Connect API key's account/team"; exit 1; }

          echo "==> Resolving distribution certificate id"
          app-store-connect certificates list --type DISTRIBUTION --json > /tmp/certs.json
          CERT_ID=$(python3 -c "import json; d=json.load(open('/tmp/certs.json')); d=d.get('data',d) if isinstance(d,dict) else d; print(d[0]['id'] if d else '')")
          echo "    distribution certificate id: $CERT_ID"
          [ -n "$CERT_ID" ] || { echo "!! No DISTRIBUTION (Apple Distribution) certificate found"; exit 1; }
          # If more than one distribution cert exists, the fresh profile might reference a
          # different cert than the one automatic signing loaded into the keychain, which
          # would break signing. There should be exactly one; warn loudly if not.
          CERT_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/certs.json')); d=d.get('data',d) if isinstance(d,dict) else d; print(len(d))")
          [ "$CERT_COUNT" = "1" ] || echo "WARNING: $CERT_COUNT distribution certificates found; using the first ($CERT_ID). If the archive fails with a certificate/profile mismatch, prune the extra distribution certificates."

          echo "==> Deleting stale App Store profiles (legacy name + any we previously created)"
          app-store-connect profiles list --type IOS_APP_STORE --json > /tmp/profiles.json || echo '[]' > /tmp/profiles.json
          python3 -c "import json; d=json.load(open('/tmp/profiles.json')); d=d.get('data',d) if isinstance(d,dict) else d; [print(p['id']) for p in d if (p.get('attributes',{}).get('name','')=='Gillie app store profile' or p.get('attributes',{}).get('name','').startswith('Gillie CI AppStore'))]" > /tmp/stale_ids.txt || true
          while read -r PID; do
            [ -n "$PID" ] || continue
            echo "    deleting profile $PID"
            app-store-connect profiles delete "$PID" --ignore-not-found || true
          done < /tmp/stale_ids.txt

          echo "==> Creating a fresh App Store profile (inherits Push from the App ID)"
          app-store-connect profiles create "$BUNDLE_RESOURCE_ID" \
            --certificate-ids "$CERT_ID" \
            --type IOS_APP_STORE \
            --name "Gillie CI AppStore $(date +%Y%m%d%H%M%S)" \
            --save
          echo "==> Profiles now installed locally:"
          ls -la "$PROFILES_DIR" || true
          # Hard gate: confirm the freshly created profile actually carries Push before we
          # hand off to xcode-project use-profiles. Fail fast with a clear message instead
          # of a cryptic archive error if Push isn't enabled on the App ID.
          shopt -s nullglob
          FOUND_PUSH=0
          for p in "$PROFILES_DIR/"*.mobileprovision; do
            if security cms -D -i "$p" 2>/dev/null | grep -qi "aps-environment"; then FOUND_PUSH=1; fi
          done
          [ "$FOUND_PUSH" = "1" ] || { echo "!! The freshly created profile is MISSING aps-environment. This means Push Notifications is NOT enabled on the App ID for $BUNDLE_ID. Enable it under Identifiers -> $BUNDLE_ID -> Push Notifications, then rebuild."; exit 1; }
          echo "==> Fresh profile carries Push (aps-environment). Proceeding."
      - name: Fetch signing files
        script: |
          set -e
          # The previous step deleted the stale profile and created a fresh one that
          # includes Push. Verify it really carries aps-environment, then apply the
          # certificate (loaded into the keychain by automatic signing) + this profile
          # to the Xcode project. If you still see "PUSH MISSING" here, Push is not
          # actually enabled on the App ID -- enable it under Identifiers and rebuild.
          echo "==> Provisioning profiles installed by automatic signing:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo "==> Inspecting each profile for the Push (aps-environment) entitlement:"
          shopt -s nullglob
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            echo "---- $p ----"
            security cms -D -i "$p" 2>/dev/null | grep -A1 "<key>Name</key>" || true
            if security cms -D -i "$p" 2>/dev/null | grep -qi "aps-environment"; then
              echo "   PUSH OK: aps-environment IS present in this profile"
            else
              echo "   PUSH MISSING: aps-environment is NOT in this profile"
            fi
          done
          # Apply the installed certificate + profile to the Xcode project.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Run the archive/IPA build, but on failure dump the REAL xcodebuild
          # error lines to the console. `xcode-project build-ipa` writes the full
          # xcodebuild output to /tmp/xcodebuild_logs/*.log; Codemagic's step view
          # only shows the "Failed to archive" summary, which hides the actual
          # compiler/signing error. This surfaces it inline so it's diagnosable.
          set +e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
          BUILD_EXIT=$?
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "==================== xcodebuild errors ===================="
            grep -nEi "error:|Provisioning profile|aps-environment|code ?sign|requires a provisioning|no profiles|doesn't include|no account|no signing certificate|entitlement" /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -n 120
            echo "================ last 150 lines of log ==================="
            tail -n 150 /tmp/xcodebuild_logs/*.log 2>/dev/null
            echo "=========================================================="
          fi
          exit "$BUILD_EXIT"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Flip submit_to_app_store to true once
        # you're ready to push a build to App Store review.
        submit_to_testflight: true
        submit_to_app_store: false
